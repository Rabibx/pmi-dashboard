name: MAJ donnees PMI

on:
  schedule:
    - cron: '0 7-22 * * 1-5'
    - cron: '0 8,12 * * 6,0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Installer requests
        run: pip install requests --quiet --break-system-packages

      - name: Fetcher les donnees
        run: python3 scripts/fetch_data.py

      - name: Commit et push data.json
        run: |
          git config user.name "PMI Bot"
          git config user.email "bot@pmi-dashboard.local"
          git add data.json
          if git diff --staged --quiet; then
            echo "Aucun changement dans data.json."
          else
            HEURE=$(TZ='Europe/Paris' date '+%d/%m/%Y a %H:%M')
            git commit -m "MAJ PMI - ${HEURE}"
            git push
            echo "data.json pousse sur GitHub"
          fi
