name: Mise à jour données PMI (complète)

on:
  schedule:
    - cron: '0 7-22 * * 1-5'   # Lundi-Vendredi, 9h-00h heure Paris
    - cron: '0 8,12 * * 6,0'   # Week-end : 10h et 14h
  workflow_dispatch:             # Lancement manuel depuis GitHub

jobs:
  fetch-and-calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer les dépendances Python
        run: pip install requests --quiet

      - name: Récupérer données de marché + calculer indicateurs techniques
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
import requests, json, time, sys
from datetime import datetime, timezone, timedelta
from math import isnan

TZ_PARIS = timezone(timedelta(hours=2))  # CEST (été)
now_utc = datetime.now(timezone.utc)
now_paris = datetime.now(TZ_PARIS)

print(f"🕐 Heure Paris : {now_paris.strftime('%d/%m/%Y %H:%M')}")

# ─────────────────────────────────────────────
# 1. DONNÉES HISTORIQUES YAHOO FINANCE (200 jours)
#    Pour calculer RSI, SMA 50j, SMA 200j, MACD
# ─────────────────────────────────────────────
FALLBACK_PRICE = 173.75

def get_yahoo_history(ticker="PM", days=220):
    """Récupère l'historique de cours via Yahoo Finance (endpoint non officiel mais stable)."""
    end = int(time.time())
    start = int(time.time()) - days * 86400
    url = f"https://query1.finance.yahoo.com/v8/finance/chart/{ticker}"
    params = {
        "period1": start, "period2": end,
        "interval": "1d", "range": f"{days}d"
    }
    headers = {"User-Agent": "Mozilla/5.0"}
    try:
        r = requests.get(url, params=params, headers=headers, timeout=15)
        r.raise_for_status()
        data = r.json()
        closes = data["chart"]["result"][0]["indicators"]["quote"][0]["close"]
        timestamps = data["chart"]["result"][0]["timestamps"]
        # Nettoyer les None
        pairs = [(t, c) for t, c in zip(timestamps, closes) if c is not None]
        closes_clean = [c for _, c in pairs]
        print(f"✅ Yahoo Finance : {len(closes_clean)} cours récupérés pour {ticker}")
        return closes_clean
    except Exception as e:
        print(f"⚠️ Yahoo Finance erreur : {e}")
        return []

def get_yahoo_quote(ticker="PM"):
    """Récupère le cours actuel, variations, volume."""
    url = f"https://query1.finance.yahoo.com/v8/finance/chart/{ticker}"
    params = {"interval": "1d", "range": "5d"}
    headers = {"User-Agent": "Mozilla/5.0"}
    try:
        r = requests.get(url, params=params, headers=headers, timeout=15)
        r.raise_for_status()
        data = r.json()
        meta = data["chart"]["result"][0]["meta"]
        quote = {
            "pm_price": round(meta.get("regularMarketPrice", FALLBACK_PRICE), 2),
            "pm_open": round(meta.get("regularMarketOpen", 0), 2),
            "pm_high": round(meta.get("regularMarketDayHigh", 0), 2),
            "pm_low": round(meta.get("regularMarketDayLow", 0), 2),
            "pm_volume": f"{meta.get('regularMarketVolume', 0)/1e6:.1f}M",
            "pm_prev_close": round(meta.get("regularMarketPreviousClose", FALLBACK_PRICE), 2),
            "market_status": "open" if meta.get("marketState") == "REGULAR" else "closed",
        }
        price = quote["pm_price"]
        prev = quote["pm_prev_close"]
        quote["pm_chg_abs"] = round(price - prev, 2)
        quote["pm_chg_pct"] = round((price - prev) / prev * 100, 2)
        print(f"✅ Cours PM : {price}$ ({quote['pm_chg_pct']:+.2f}%)")
        return quote
    except Exception as e:
        print(f"⚠️ Yahoo quote erreur : {e}")
        return {}

def get_yahoo_eurusd():
    """Récupère EUR/USD."""
    url = "https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X"
    params = {"interval": "1d", "range": "1d"}
    headers = {"User-Agent": "Mozilla/5.0"}
    try:
        r = requests.get(url, params=params, headers=headers, timeout=10)
        r.raise_for_status()
        data = r.json()
        rate = data["chart"]["result"][0]["meta"]["regularMarketPrice"]
        rate = round(rate, 4)
        print(f"✅ EUR/USD : {rate}")
        return {"eurusd": rate, "usdeur": round(1/rate, 4)}
    except Exception as e:
        print(f"⚠️ EUR/USD erreur : {e}")
        return {"eurusd": 1.085, "usdeur": 0.9217}

def get_perf(closes, current_price):
    """Calcule les performances sur différentes périodes."""
    result = {}
    # 5 jours ouvrés ≈ 1 semaine
    if len(closes) >= 6:
        ref = closes[-6]
        result["pm_week_chg"] = round((current_price - ref) / ref * 100, 2)
    if len(closes) >= 22:
        ref = closes[-22]
        result["pm_month_chg"] = round((current_price - ref) / ref * 100, 2)
    # YTD : approximation depuis début janvier (environ 110 jours ouvrés)
    if len(closes) >= 110:
        ref = closes[-110]
        result["pm_ytd_chg"] = round((current_price - ref) / ref * 100, 2)
    # 52 semaines = 252 jours ouvrés
    if len(closes) >= 252:
        ref = closes[-252]
        result["pm_1y_chg"] = round((current_price - ref) / ref * 100, 2)
    elif len(closes) >= 2:
        ref = closes[0]
        result["pm_1y_chg"] = round((current_price - ref) / ref * 100, 2)
    return result

# ─────────────────────────────────────────────
# 2. CALCULS TECHNIQUES
# ─────────────────────────────────────────────

def sma(closes, n):
    """Simple Moving Average sur n périodes."""
    if len(closes) < n:
        return None
    return round(sum(closes[-n:]) / n, 2)

def ema(closes, n):
    """Exponential Moving Average sur n périodes."""
    if len(closes) < n:
        return None
    k = 2 / (n + 1)
    ema_val = sum(closes[:n]) / n
    for price in closes[n:]:
        ema_val = price * k + ema_val * (1 - k)
    return round(ema_val, 4)

def rsi(closes, period=14):
    """RSI sur 14 périodes."""
    if len(closes) < period + 1:
        return None
    deltas = [closes[i] - closes[i-1] for i in range(1, len(closes))]
    gains = [max(d, 0) for d in deltas]
    losses = [abs(min(d, 0)) for d in deltas]
    avg_gain = sum(gains[:period]) / period
    avg_loss = sum(losses[:period]) / period
    for i in range(period, len(deltas)):
        avg_gain = (avg_gain * (period - 1) + gains[i]) / period
        avg_loss = (avg_loss * (period - 1) + losses[i]) / period
    if avg_loss == 0:
        return 100.0
    rs = avg_gain / avg_loss
    return round(100 - (100 / (1 + rs)), 2)

def macd_calc(closes):
    """MACD (12, 26, 9) — retourne les 7 dernières valeurs de l'histogramme."""
    if len(closes) < 35:
        return None
    ema12_series = []
    ema26_series = []
    k12 = 2 / 13
    k26 = 2 / 27
    e12 = sum(closes[:12]) / 12
    e26 = sum(closes[:26]) / 26
    for price in closes[12:]:
        e12 = price * k12 + e12 * (1 - k12)
        ema12_series.append(e12)
    for price in closes[26:]:
        e26 = price * k26 + e26 * (1 - k26)
        ema26_series.append(e26)
    n = min(len(ema12_series), len(ema26_series))
    macd_line = [ema12_series[-(n-i)] - ema26_series[-(n-i)] for i in range(n-1, -1, -1)]
    if len(macd_line) < 9:
        return None
    k9 = 2 / 10
    signal = sum(macd_line[:9]) / 9
    signal_series = [signal]
    for v in macd_line[9:]:
        signal = v * k9 + signal * (1 - k9)
        signal_series.append(signal)
    hist = [m - s for m, s in zip(macd_line[-len(signal_series):], signal_series)]
    # Retourner les 7 dernières valeurs de l'histogramme
    hist7 = [round(h, 3) for h in hist[-7:]]
    labels = ["J-30", "J-25", "J-20", "J-15", "J-10", "J-5", "J"]
    # Signal actuel
    last_hist = hist7[-1] if hist7 else 0
    signal_txt = "haussier" if last_hist > 0 else "baissier"
    return {"hist": hist7, "labels": labels, "signal": signal_txt, "last_value": hist7[-1] if hist7 else 0}

# ─────────────────────────────────────────────
# 3. S&P 500
# ─────────────────────────────────────────────
def get_sp500_chg():
    url = "https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC"
    params = {"interval": "1d", "range": "2d"}
    headers = {"User-Agent": "Mozilla/5.0"}
    try:
        r = requests.get(url, params=params, headers=headers, timeout=10)
        data = r.json()
        meta = data["chart"]["result"][0]["meta"]
        price = meta["regularMarketPrice"]
        prev = meta["regularMarketPreviousClose"]
        chg = round((price - prev) / prev * 100, 2)
        print(f"✅ S&P 500 : {chg:+.2f}%")
        return chg
    except Exception as e:
        print(f"⚠️ S&P500 erreur : {e}")
        return None

# ─────────────────────────────────────────────
# 4. EXÉCUTION
# ─────────────────────────────────────────────
print("\n--- Récupération des données ---")

closes = get_yahoo_history("PM", 260)
quote  = get_yahoo_quote("PM")
fx     = get_yahoo_eurusd()
sp500  = get_sp500_chg()

current_price = quote.get("pm_price", FALLBACK_PRICE)
perfs  = get_perf(closes, current_price)

# Indicateurs techniques
sma50_val  = sma(closes, 50)
sma200_val = sma(closes, 200)
rsi_val    = rsi(closes, 14)
macd_data  = macd_calc(closes)

print(f"\n--- Indicateurs techniques ---")
print(f"SMA 50j  : {sma50_val}$")
print(f"SMA 200j : {sma200_val}$")
print(f"RSI 14j  : {rsi_val}")
if macd_data:
    print(f"MACD signal : {macd_data['signal']}, hist J : {macd_data['last_value']}")

# ─────────────────────────────────────────────
# 5. ASSEMBLAGE DU data.json
# ─────────────────────────────────────────────
# Lire data.json existant pour conserver les données manuelles
try:
    with open("data.json", "r") as f:
        existing = json.load(f)
    print("\n✅ data.json existant chargé (données manuelles préservées)")
except:
    existing = {}
    print("\n⚠️ Nouveau data.json créé")

# Données automatiques (écrasent les valeurs précédentes)
auto_data = {
    # Cours et marché
    **quote,
    **fx,
    **perfs,
    "sp500_chg": sp500,
    # Indicateurs techniques calculés
    "technicals": {
        "sma50":  sma50_val,
        "sma200": sma200_val,
        "rsi14":  rsi_val,
        "macd":   macd_data,
        "sma50_signal":  "above" if sma50_val  and current_price > sma50_val  else "below",
        "sma200_signal": "above" if sma200_val and current_price > sma200_val else "below",
        "rsi_zone": "suracheté" if rsi_val and rsi_val > 70 else "survendu" if rsi_val and rsi_val < 30 else "neutre",
    },
    # Horodatage
    "updated_at": now_utc.isoformat(),
    "updated_paris": now_paris.strftime("%d/%m/%Y à %H:%M"),
    "is_fallback": False,
}

# Fusionner : les données manuelles (analystes, résultats, calendrier)
# ont priorité sur leurs propres clés, mais les données auto écrasent les données auto
MANUAL_KEYS = ["manuel_analystes", "manuel_resultats", "manuel_calendrier", "manuel_consensus"]
final = {**existing}  # partir de l'existant
for k, v in auto_data.items():
    final[k] = v  # écraser avec les nouvelles données auto
# Préserver explicitement les clés manuelles
for k in MANUAL_KEYS:
    if k in existing:
        final[k] = existing[k]

with open("data.json", "w") as f:
    json.dump(final, f, ensure_ascii=False, indent=2)

print(f"\n✅ data.json sauvegardé — PM : {current_price}$ | EUR/USD : {fx['eurusd']} | SMA50 : {sma50_val}$ | RSI : {rsi_val}")
PYEOF

      - name: Commit et push
        run: |
          git config user.name "PMI Dashboard Bot"
          git config user.email "bot@pmi-dashboard"
          git add data.json
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            HEURE=$(TZ='Europe/Paris' date '+%d/%m/%Y à %H:%M')
            git commit -m "📊 PMI update — $HEURE (Paris)"
            git push
            echo "✅ Poussé"
          fi
